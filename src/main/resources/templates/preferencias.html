<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentaSimple — Preferencias</title>
    <link rel="stylesheet" th:href="@{/css/styles.css(v=2)}">
</head>
<body>
<header th:replace="~{fragments :: cabecera('preferencias')}"></header>

<main>
    <div class="card">
        <h2>⚙ Preferencias de formato</h2>
        <form th:action="@{/preferencias}" method="post">
            <label for="moneda">Formato de moneda</label>
            <select id="moneda" name="moneda">
                <option value="USD" th:selected="${moneda == 'USD'}">USD (US$)</option>
                <option value="ARS" th:selected="${moneda == 'ARS'}">ARS ($)</option>
            </select>
            <small>Cotización: US$ 1 = $ 1.500 (al pasar a pesos, el monto se multiplica por 1.500).</small>

            <label for="fecha">Formato de fecha</label>
            <select id="fecha" name="fecha">
                <option value="dd/MM/yyyy" th:selected="${fecha == 'dd/MM/yyyy'}">dd/MM/yyyy</option>
                <option value="yyyy-MM-dd" th:selected="${fecha == 'yyyy-MM-dd'}">yyyy-MM-dd</option>
                <option value="MM/dd/yyyy" th:selected="${fecha == 'MM/dd/yyyy'}">MM/dd/yyyy</option>
            </select>

            <button type="submit">Guardar</button>
        </form>

        <div class="preview">
            <strong>Vista previa</strong>
            <div class="total-row"><span>Monto</span><span th:text="${previewMonto}">$ 0</span></div>
            <div class="total-row"><span>Fecha</span><span th:text="${previewFecha}">--</span></div>
        </div>
    </div>
</main>
</body>
</html>
