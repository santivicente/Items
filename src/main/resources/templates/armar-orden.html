<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentaSimple — Armar orden</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments :: cabecera('orden')}"></header>

<main>
    <div class="card">
        <h2>Catálogo de productos</h2>
        <ul class="items">
            <li th:each="p : ${catalogo}">
                <span th:text="${p.getNombre()} + ' — ' + ${fmt.mostrarMonto(p.getPrecio())}">Producto</span>
                <form th:action="@{/items/simple}" method="post">
                    <input type="hidden" name="productoId" th:value="${p.getId()}">
                    <button type="submit">Agregar</button>
                </form>
            </li>
        </ul>
    </div>

    <div class="card">
        <h2>Armar un kit</h2>
        <p>Elegí un nombre y tildá los productos que querés incluir (los que quieras).</p>
        <form th:action="@{/items/kit}" method="post">
            <label for="kitNombre">Nombre del kit</label>
            <input id="kitNombre" name="kitNombre" required placeholder="Kit Oficina">

            <fieldset class="check-grid">
                <legend>Productos del kit</legend>
                <label class="check" th:each="p : ${catalogo}">
                    <input type="checkbox" name="productoIds" th:value="${p.getId()}">
                    <span th:text="${p.getNombre()} + ' (' + ${fmt.mostrarMonto(p.getPrecio())} + ')'">Producto</span>
                </label>
            </fieldset>

            <button type="submit">Agregar kit a la orden</button>
        </form>
    </div>

    <div class="card">
        <h2 th:text="${orden.getDescripcion()}">Orden</h2>
        <ul class="items">
            <li th:each="item : ${items}" style="flex-direction: column; align-items: stretch;">
                <div style="display:flex; justify-content:space-between;">
                    <span th:text="${item.getDescripcion()}">Item</span>
                    <span th:text="${fmt.mostrarMonto(item.calcularTotal())}">$0</span>
                </div>
                <ul class="arbol items"
                    th:if="${item instanceof T(com.ventasimple.domain.composite.ItemCompuesto)}">
                    <li th:each="parte : ${item.getPartes()}">
                        <span th:text="'↳ ' + ${parte.getDescripcion()}">Parte</span>
                        <span th:text="${fmt.mostrarMonto(parte.calcularTotal())}">$0</span>
                    </li>
                </ul>
            </li>
            <li th:if="${items.isEmpty()}"><em>La orden está vacía. Agregá productos o kits.</em></li>
        </ul>
        <div class="total-row">
            <strong>Subtotal</strong>
            <strong th:text="${fmt.mostrarMonto(subtotal)}">$0</strong>
        </div>
        <div class="acciones">
            <a class="btn" th:href="@{/total}">Ir al total y descuento</a>
            <form th:action="@{/nueva}" method="post">
                <button class="btn-sec" type="submit">Nueva orden</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
