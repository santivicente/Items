<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentaSimple — Armar orden</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header>
    <h1>🛒 VentaSimple</h1>
    <nav>
        <a th:href="@{/}">Armar orden</a>
        <a th:href="@{/resumen}">Resumen</a>
        <a th:href="@{/total}">Total y descuento</a>
        <a th:href="@{/preferencias}">Preferencias</a>
    </nav>
</header>

<main>
    <div class="card">
        <h2>Agregar producto</h2>
        <form th:action="@{/items/simple}" method="post">
            <div class="row">
                <div>
                    <label for="nombre">Producto</label>
                    <input id="nombre" name="nombre" required placeholder="Notebook">
                </div>
                <div>
                    <label for="precio">Precio</label>
                    <input id="precio" name="precio" type="number" step="0.01" min="0" required placeholder="1500">
                </div>
            </div>
            <button type="submit">Agregar producto</button>
        </form>
    </div>

    <div class="card">
        <h2>Agregar kit (2 productos)</h2>
        <form th:action="@{/items/kit}" method="post">
            <label for="kitNombre">Nombre del kit</label>
            <input id="kitNombre" name="kitNombre" required placeholder="Kit Accesorios">
            <div class="row">
                <div>
                    <label for="nombre1">Producto 1</label>
                    <input id="nombre1" name="nombre1" required placeholder="Mouse">
                </div>
                <div>
                    <label for="precio1">Precio 1</label>
                    <input id="precio1" name="precio1" type="number" step="0.01" min="0" required placeholder="80">
                </div>
            </div>
            <div class="row">
                <div>
                    <label for="nombre2">Producto 2</label>
                    <input id="nombre2" name="nombre2" required placeholder="Teclado">
                </div>
                <div>
                    <label for="precio2">Precio 2</label>
                    <input id="precio2" name="precio2" type="number" step="0.01" min="0" required placeholder="120">
                </div>
            </div>
            <button type="submit">Agregar kit</button>
        </form>
    </div>

    <div class="card">
        <h2 th:text="${orden.getDescripcion()}">Orden</h2>
        <ul class="items">
            <li th:each="item : ${items}">
                <span th:text="${item.getDescripcion()}">Item</span>
                <span th:text="${fmt.mostrarMonto(item.calcularTotal())}">$0</span>
            </li>
            <li th:if="${items.isEmpty()}"><em>La orden está vacía. Agregá productos o kits.</em></li>
        </ul>
        <div class="total-row">
            <strong>Subtotal</strong>
            <strong th:text="${fmt.mostrarMonto(subtotal)}">$0</strong>
        </div>
        <div class="acciones">
            <a class="btn" th:href="@{/total}">Ir al total y descuento</a>
            <form th:action="@{/nueva}" method="post">
                <button class="btn-sec" type="submit">Nueva orden</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
