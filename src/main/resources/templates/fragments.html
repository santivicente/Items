<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="cabecera(activo)">
    <h1>🛒 VentaSimple</h1>
    <nav>
        <a th:href="@{/}" th:classappend="${activo == 'orden'} ? 'activo'"
           th:attr="aria-current=${activo == 'orden'} ? 'page'">Armar orden</a>
        <a th:href="@{/resumen}" th:classappend="${activo == 'resumen'} ? 'activo'"
           th:attr="aria-current=${activo == 'resumen'} ? 'page'">Resumen</a>
        <a th:href="@{/total}" th:classappend="${activo == 'total'} ? 'activo'"
           th:attr="aria-current=${activo == 'total'} ? 'page'">Total y descuento</a>
        <a th:href="@{/preferencias}" th:classappend="${activo == 'preferencias'} ? 'activo'"
           th:attr="aria-current=${activo == 'preferencias'} ? 'page'">Preferencias</a>
    </nav>
</header>
</body>
</html>
