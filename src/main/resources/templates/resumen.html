<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentaSimple — Resumen</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header>
    <h1>🛒 VentaSimple</h1>
    <nav>
        <a th:href="@{/}">Armar orden</a>
        <a th:href="@{/resumen}">Resumen</a>
        <a th:href="@{/total}">Total y descuento</a>
        <a th:href="@{/preferencias}">Preferencias</a>
    </nav>
</header>

<main>
    <div class="card">
        <h2 th:text="'Resumen — ' + ${orden.getDescripcion()}">Resumen</h2>
        <ul class="items">
            <li th:each="item : ${items}" style="flex-direction: column; align-items: stretch;">
                <div style="display:flex; justify-content:space-between;">
                    <span th:text="${item.getDescripcion()}">Item</span>
                    <span th:text="${fmt.mostrarMonto(item.calcularTotal())}">$0</span>
                </div>
                <ul class="arbol items"
                    th:if="${item instanceof T(com.ventasimple.domain.composite.ItemCompuesto)}">
                    <li th:each="parte : ${item.getPartes()}">
                        <span th:text="'↳ ' + ${parte.getDescripcion()}">Parte</span>
                        <span th:text="${fmt.mostrarMonto(parte.calcularTotal())}">$0</span>
                    </li>
                </ul>
            </li>
            <li th:if="${items.isEmpty()}"><em>La orden está vacía.</em></li>
        </ul>
        <div class="total-row">
            <strong>Subtotal</strong>
            <strong th:text="${fmt.mostrarMonto(subtotal)}">$0</strong>
        </div>
        <a class="btn" th:href="@{/}">Volver</a>
    </div>
</main>
</body>
</html>
