<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentaSimple — Total y descuento</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments :: cabecera('total')}"></header>

<main>
    <div class="card">
        <h2>🧾 Ticket — <span th:text="${orden.getDescripcion()}">Orden</span></h2>

        <div class="total-row">
            <span>Fecha</span>
            <span th:text="${fechaVenta}">--</span>
        </div>

        <div class="total-row">
            <span>Subtotal</span>
            <span th:text="${fmt.mostrarMonto(subtotal)}">$0</span>
        </div>

        <form th:action="@{/total}" method="post">
            <label for="tipo">Descuento</label>
            <select id="tipo" name="tipo" onchange="this.form.submit()">
                <option value="sin" th:selected="${tipoDescuento == 'sin'}">Sin descuento</option>
                <option value="porcentaje" th:selected="${tipoDescuento == 'porcentaje'}">Descuento 10%</option>
                <option value="vip" th:selected="${tipoDescuento == 'vip'}">Cliente VIP (15%)</option>
            </select>
            <noscript><button type="submit">Aplicar</button></noscript>
        </form>

        <div class="total-row">
            <span>Descuento aplicado</span>
            <span th:text="${descuentoNombre}">Sin descuento</span>
        </div>

        <div class="total-row total-final">
            <span>TOTAL FINAL</span>
            <span th:text="${fmt.mostrarMonto(totalFinal)}">$0</span>
        </div>

        <div class="acciones">
            <form th:action="@{/cerrar}" method="post">
                <button type="submit" th:disabled="${items.isEmpty()}">✓ Cerrar venta</button>
            </form>
            <a class="btn btn-sec" th:href="@{/}">Volver a la orden</a>
        </div>
    </div>
</main>
</body>
</html>
